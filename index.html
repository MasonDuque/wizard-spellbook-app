<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wizard Spellbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="book-shell">
      <section class="view active" id="coverView">
        <article class="cover-page">
          <div class="cover-title">
            <h1 id="coverName">Unnamed Wizard's Spellbook</h1>
            <p id="coverMeta">Level 1 Apprentice</p>
          </div>
          <form id="coverProfileForm" class="cover-form">
            <label>Wizard Name <input id="coverWizardName" name="wizardName" required /></label>
            <label>Subclass <input id="coverWizardClass" name="wizardClass" required /></label>
            <label>Level <input id="coverWizardLevel" name="wizardLevel" type="number" min="1" max="20" required /></label>
            <button type="submit">Save Cover</button>
          </form>
          <button id="openBookBtn" class="corner-btn">Open the Book ➜</button>
        </article>
      </section>

      <section class="view" id="bookView">
        <article class="page" id="pageContent"></article>
        <nav class="page-nav">
          <button id="prevBtn" type="button">⬅ Previous</button>
          <span id="pageLabel">Page</span>
          <button id="nextBtn" type="button">Next ➡</button>
        </nav>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
